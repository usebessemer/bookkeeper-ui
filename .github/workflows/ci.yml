name: CI

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  test:
    name: pytest (py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The `bookkeeper` framework has no PyPI release — it lives in the public
      # usebessemer/agent-classes repo (no auth needed). Install it from git
      # FIRST so the bare `bookkeeper` requirement below is already satisfied
      # and pip never consults PyPI for it (see #10: a squatted, unrelated
      # `bookkeeper` package exists there).
      - name: Install framework (agent-classes)
        run: pip install "git+https://github.com/usebessemer/agent-classes.git"

      # The [test] extra pins pytest + pytest-asyncio (+ httpx for the ASGI
      # tests); asyncio_mode = auto is in pyproject, so the async suite runs
      # self-contained with no extra config.
      - name: Install
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest
